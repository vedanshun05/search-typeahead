services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: search_typeahead
    expose:
      - "5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: .
    ports:
      - "3001:80"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/search_typeahead
      REDIS_URL: redis://redis:6379
      CACHE_TTL_SECONDS: "300"
      CACHE_NODE_COUNT: "3"
      CACHE_VIRTUAL_NODES: "150"
      BATCH_FLUSH_INTERVAL_MS: "5000"
      BATCH_BUFFER_SIZE: "100"
      TRENDING_ALPHA: "0.3"
      TRENDING_DECAY: "0.95"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  pgdata:
