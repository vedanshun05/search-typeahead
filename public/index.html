  <title>Search Typeahead - HLD101</title>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary: #0d9488;
      --primary-hover: #0f766e;
      --primary-light: #f0fdfa;
      --bg: #fafaf9;
      --surface: #ffffff;
      --surface-hover: #f5f5f4;
      --border: #e7e5e4;
      --border-focus: #0d9488;
      --text: #1c1917;
      --text-secondary: #78716c;
      --text-tertiary: #a8a29e;
      --success: #059669;
      --success-bg: #ecfdf5;
      --success-border: #a7f3d0;
      --error: #dc2626;
      --error-bg: #fef2f2;
      --error-border: #fca5a5;
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
      --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.07), 0 2px 4px -2px rgba(0,0,0,0.05);
      --shadow-lg: 0 10px 30px rgba(0,0,0,0.08), 0 4px 8px -2px rgba(0,0,0,0.04);
      --radius: 12px;
      --radius-sm: 8px;
      --radius-full: 9999px;
      --transition: 200ms cubic-bezier(0.4, 0, 0.2, 1);
      --theme-transition: 400ms ease;
    }

    .theme-transitioning, .theme-transitioning * {
      transition: background-color var(--theme-transition),
                  border-color var(--theme-transition),
                  color var(--theme-transition),
                  box-shadow var(--theme-transition) !important;
    }

    [data-theme="dark"] {
      --primary: #14b8a6;
      --primary-hover: #0d9488;
      --primary-light: #134e4a;
      --bg: #1c1917;
      --surface: #292524;
      --surface-hover: #44403c;
      --border: #44403c;
      --border-focus: #14b8a6;
      --text: #f5f5f4;
      --text-secondary: #a8a29e;
      --text-tertiary: #78716c;
      --success: #34d399;
      --success-bg: #064e3b;
      --success-border: #065f46;
      --error: #f87171;
      --error-bg: #450a0a;
      --error-border: #7f1d1d;
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.3);
      --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.4), 0 2px 4px -2px rgba(0,0,0,0.3);
      --shadow-lg: 0 10px 30px rgba(0,0,0,0.5), 0 4px 8px -2px rgba(0,0,0,0.3);
    }

    [data-theme="warm"] {
      --primary: #d97706;
      --primary-hover: #b45309;
      --primary-light: #fffbeb;
      --bg: #fef3c7;
      --surface: #fffbeb;
      --surface-hover: #fef3c7;
      --border: #fde68a;
      --border-focus: #d97706;
      --text: #292524;
      --text-secondary: #78716c;
      --text-tertiary: #a8a29e;
      --success: #65a30d;
      --success-bg: #ecfccb;
      --success-border: #bef264;
      --error: #dc2626;
      --error-bg: #fef2f2;
      --error-border: #fca5a5;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      transition: background var(--transition), color var(--transition);
    }

    .container {
      max-width: 680px;
      margin: 0 auto;
      padding: 48px 20px 80px;
    }

    .header {
      text-align: center;
      margin-bottom: 32px;
    }

    .header h1 {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, #0d9488, #0891b2);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .header .subtitle {
      color: var(--text-secondary);
      font-size: 14px;
      margin-top: 6px;
    }

    .header .badge-row {
      display: flex;
      justify-content: center;
      gap: 6px;
      margin-top: 10px;
      flex-wrap: wrap;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 3px 10px;
      font-size: 11px;
      font-weight: 600;
      border-radius: var(--radius-full);
      background: var(--primary-light);
      color: var(--primary);
      letter-spacing: 0.3px;
    }

    .mode-toggle {
      display: flex;
      background: var(--border);
      border-radius: var(--radius-full);
      padding: 3px;
      margin-bottom: 20px;
      position: relative;
    }

    .mode-btn {
      flex: 1;
      padding: 8px 18px;
      border: none;
      border-radius: var(--radius-full);
      background: transparent;
      color: var(--text-secondary);
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      transition: var(--transition);
      position: relative;
      z-index: 1;
    }

    .mode-btn.active {
      background: var(--surface);
      color: var(--primary);
      box-shadow: var(--shadow-sm);
    }

    .mode-btn:not(.active):hover {
      color: var(--text);
    }

    .search-wrapper {
      position: relative;
      margin-bottom: 20px;
    }

    .search-row {
      display: flex;
      gap: 8px;
      position: relative;
    }

    .search-box {
      width: 100%;
      padding: 14px 18px;
      font-size: 16px;
      border: 2px solid var(--border);
      border-radius: var(--radius);
      outline: none;
      background: var(--surface);
      color: var(--text);
      transition: var(--transition);
    }

    .search-box::placeholder {
      color: var(--text-tertiary);
    }

    .search-box:focus {
      border-color: var(--border-focus);
      box-shadow: 0 0 0 4px rgba(13, 148, 136, 0.1);
    }

    .search-box.has-value {
      border-color: var(--primary-light);
    }

    .search-btn {
      padding: 14px 28px;
      font-size: 15px;
      font-weight: 600;
      background: linear-gradient(135deg, var(--primary), var(--primary-hover));
      color: white;
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      white-space: nowrap;
      transition: var(--transition);
      box-shadow: 0 2px 8px rgba(13, 148, 136, 0.3);
    }

    .search-btn:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(13, 148, 136, 0.35);
    }

    .search-btn:active:not(:disabled) {
      transform: translateY(0);
    }

    .search-btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      box-shadow: none;
    }

    .suggestions {
      position: absolute;
      top: calc(100% + 6px);
      left: 0;
      right: 0;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow-lg);
      z-index: 100;
      max-height: 420px;
      overflow-y: auto;
      animation: slideDown 180ms cubic-bezier(0.4, 0, 0.2, 1);
      transform-origin: top center;
    }

    @keyframes slideDown {
      from {
        opacity: 0;
        transform: translateY(-8px) scale(0.98);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .suggestion-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 11px 18px;
      cursor: pointer;
      transition: var(--transition);
      border-left: 3px solid transparent;
    }

    .suggestion-item:hover,
    .suggestion-item.active {
      background: var(--surface-hover);
      border-left-color: var(--primary);
    }

    .suggestion-item .query-text {
      font-size: 15px;
      font-weight: 450;
    }

    .suggestion-item .count-badge {
      font-size: 12px;
      color: var(--text-secondary);
      background: var(--surface-hover);
      padding: 3px 10px;
      border-radius: var(--radius-full);
      font-weight: 500;
      flex-shrink: 0;
    }

    .suggestion-item.active .query-text {
      color: var(--primary);
    }

    .suggestion-item:first-child { border-radius: var(--radius) var(--radius) 0 0; }
    .suggestion-item:last-child { border-radius: 0 0 var(--radius) var(--radius); }

    .no-suggestions {
      padding: 24px 18px;
      color: var(--text-tertiary);
      text-align: center;
      font-size: 14px;
    }

    .section-title {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--text-tertiary);
      margin: 28px 0 12px;
      font-weight: 600;
    }

    .search-result {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--success-bg);
      border: 1px solid var(--success-border);
      border-radius: var(--radius-sm);
      padding: 12px 16px;
      margin-bottom: 16px;
      font-size: 14px;
      color: var(--success);
      font-weight: 500;
      animation: slideIn 200ms ease;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .search-result .check-icon {
      width: 20px;
      height: 20px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: var(--success);
      color: white;
      border-radius: 50%;
      font-size: 11px;
      font-weight: 700;
      flex-shrink: 0;
    }

    .trending-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    @media (max-width: 480px) {
      .trending-grid { grid-template-columns: 1fr; }
    }

    .trending-item {
      background: var(--surface);
      padding: 10px 14px;
      border-radius: var(--radius-sm);
      font-size: 14px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border: 1px solid var(--border);
      cursor: pointer;
      transition: var(--transition);
    }

    .trending-item:hover {
      background: var(--surface-hover);
      border-color: var(--primary-light);
      transform: translateY(-1px);
      box-shadow: var(--shadow-sm);
    }

    .trending-item .rank {
      font-weight: 700;
      color: var(--primary);
      margin-right: 8px;
      font-variant-numeric: tabular-nums;
    }

    .trending-item .trending-count {
      font-size: 12px;
      color: var(--text-tertiary);
      font-weight: 500;
    }

    .hint-text {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--text-tertiary);
      margin-top: 6px;
      padding: 0 4px;
    }

    .hint-text .dot {
      width: 3px;
      height: 3px;
      border-radius: 50%;
      background: var(--text-tertiary);
    }

    .cache-indicator {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 2px 8px;
      border-radius: var(--radius-full);
      font-size: 11px;
      font-weight: 600;
    }

    .cache-indicator.hit {
      background: #d1fae5;
      color: #065f46;
    }

    .cache-indicator.miss {
      background: #fef3c7;
      color: #92400e;
    }

    .error-banner {
      background: var(--error-bg);
      border: 1px solid var(--error-border);
      border-radius: var(--radius-sm);
      padding: 12px 16px;
      margin-bottom: 16px;
      font-size: 14px;
      color: var(--error);
    }

    .loading-dots {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 4px;
      color: var(--text-tertiary);
      font-size: 14px;
    }

    .loading-dots .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid var(--border);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 600ms linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .stats-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
      gap: 10px;
      margin: 12px 0;
    }

    .stat-card {
      background: var(--surface);
      padding: 14px 16px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      transition: var(--transition);
    }

    .stat-card:hover {
      border-color: var(--primary-light);
      box-shadow: var(--shadow-sm);
    }

    .stat-card .stat-value {
      font-size: 22px;
      font-weight: 700;
      color: var(--primary);
      font-variant-numeric: tabular-nums;
    }

    .stat-card .stat-label {
      font-size: 12px;
      color: var(--text-tertiary);
      margin-top: 2px;
      font-weight: 500;
    }

    .debug-panel {
      margin-top: 36px;
      border-top: 1px solid var(--border);
      padding-top: 18px;
    }

    .debug-panel summary {
      cursor: pointer;
      font-size: 13px;
      color: var(--text-secondary);
      font-weight: 600;
      padding: 4px 0;
      user-select: none;
    }

    .debug-panel summary:hover {
      color: var(--text);
    }

    .debug-content {
      background: #1e293b;
      color: #e2e8f0;
      padding: 16px;
      border-radius: var(--radius-sm);
      font-family: 'JetBrains Mono', 'Fira Code', 'Courier New', monospace;
      font-size: 12px;
      margin-top: 8px;
      overflow-x: auto;
      white-space: pre-wrap;
      line-height: 1.6;
    }

    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px 20px;
      text-align: center;
    }

    .empty-state .empty-icon {
      font-size: 36px;
      margin-bottom: 12px;
      opacity: 0.3;
    }

    .empty-state .empty-text {
      color: var(--text-tertiary);
      font-size: 14px;
      max-width: 280px;
    }

    .empty-state .empty-hints {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      justify-content: center;
      margin-top: 12px;
    }

    .empty-state .hint-chip {
      padding: 4px 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-full);
      font-size: 12px;
      color: var(--text-secondary);
      cursor: pointer;
      transition: var(--transition);
    }

    .empty-state .hint-chip:hover {
      border-color: var(--primary);
      color: var(--primary);
      background: var(--primary-light);
    }

    .scrollbar::-webkit-scrollbar { width: 6px; }
    .scrollbar::-webkit-scrollbar-track { background: transparent; }
    .scrollbar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    .scrollbar::-webkit-scrollbar-thumb:hover { background: var(--text-tertiary); }

    .suggestions::-webkit-scrollbar { width: 6px; }
    .suggestions::-webkit-scrollbar-track { background: transparent; }
    .suggestions::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    .suggestion-item .query-prefix {
      color: var(--primary);
      font-weight: 600;
    }

    .fade-in {
      animation: fadeIn 300ms ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .status-dot {
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      margin-right: 4px;
    }

    .status-dot.online { background: #22c55e; }
    .status-dot.offline { background: #ef4444; }

    .highlight-match {
      color: var(--primary);
      font-weight: 600;
    }

    .footer {
      text-align: center;
      padding: 24px 0;
      color: var(--text-tertiary);
      font-size: 12px;
      border-top: 1px solid var(--border);
      margin-top: 48px;
    }
  </style>
</head>

              h('span', { className: 'check-icon' }, Icon('checkCircle', 20)),
              h('span', null, 'Searched successfully'),
              h('span', { style: { marginLeft: 'auto', fontWeight: 400, opacity: 0.7 } }, 'Search recorded')
            )
          : null,

        error
          ? h('div', { className: 'error-banner', key: 'error' },
              h('span', { style: { display: 'inline-flex', alignItems: 'center', gap: 6 } }, Icon('alertTriangle', 16), error)
            )
          : null,

        h('div', { className: 'search-wrapper', key: 'search-wrapper' },
          h('div', { className: 'search-row' },
            h('input', {
              ref: inputRef,
              type: 'text',
              className: 'search-box' + (inputValue.trim() ? ' has-value' : ''),
              placeholder: 'Search anything...',
              value: inputValue,
              onChange: handleInputChange,
              onKeyDown: handleKeyDown,
              autoComplete: 'off',
              autoCorrect: 'off',
              spellCheck: false,
            }),
            h('button', {
              className: 'search-btn',
              onClick: function () { submitSearch(inputValue); },
              disabled: !inputValue.trim(),
            }, h('span', { style: { display: 'inline-flex', alignItems: 'center', gap: 6 } }, Icon('search', 16), ' Search'))
          ),

          inputValue.trim() && suggestions.length > 0
            ? h('div', { className: 'suggestions scrollbar', key: 'suggestions' },
                suggestions.map(function (s, i) {
                  return h('div', {
                    key: s.query + i,
                    className: 'suggestion-item' + (selectedIdx === i ? ' active' : ''),
                    onClick: function () { submitSearch(s.query); },
                    onMouseEnter: function () { setSelectedIdx(i); },
                  },
                    h('div', { style: { display: 'flex', alignItems: 'center', gap: 10, overflow: 'hidden' } },
                      h('span', { style: { color: '#a8a29e', flexShrink: 0, display: 'flex' } }, Icon('search', 14)),
                      h('span', { className: 'query-text', style: { overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' } }, ...highlightText(s.query, inputValue.trim()))
                    ),
                    h('span', { className: 'count-badge' }, formatCount(s.count))
                  );
                })
              )
            : null,

          !loading && inputValue.trim() && suggestions.length === 0
            ? h('div', { className: 'suggestions' },
                h('div', { className: 'no-suggestions' }, 'No suggestions found for "' + inputValue.trim() + '"')
              )
            : null
        ),

        latency !== null
          ? h('div', { className: 'hint-text', key: 'latency' },
              h('span', { className: 'cache-indicator ' + (cacheHit ? 'hit' : 'miss') },
                h('span', { style: { display: 'inline-flex', alignItems: 'center', gap: 4 } }, Icon(cacheHit ? 'checkCircle' : 'xCircle', 12), 'Cache ' + (cacheHit ? 'HIT' : 'MISS'))
              ),
              h('span', { className: 'dot' }),
              h('span', null, latency + 'ms latency'),
              h('span', { className: 'dot' }),
              h('span', null, mode === 'basic' ? 'All-time ranking' : 'Recency-aware ranking')
            )
          : null,

        trending.length > 0
          ? h(React.Fragment, { key: 'trending' },
              h('div', { className: 'section-title' }, h('span', { style: { display: 'inline-flex', alignItems: 'center', gap: 6 } }, Icon('flame', 16), ' Trending Searches')),
              h('div', { className: 'trending-grid' },
                trending.slice(0, 8).map(function (s, i) {
                  return h('div', {
                    key: s.query,
                    className: 'trending-item',
                    onClick: function () {
                      setInputValue(s.query);
                    },
                  },
                    h('span', { style: { overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' } },
                      h('span', { className: 'rank' }, '#' + (i + 1)),
                      s.query
                    ),
                    h('span', { className: 'trending-count' }, formatCount(s.count))
                  );
                })
              )
            )
          : null,

        stats
          ? h(React.Fragment, { key: 'stats' },
              h('div', { className: 'section-title' }, h('span', { style: { display: 'inline-flex', alignItems: 'center', gap: 6 } }, Icon('barChart', 16), ' Batch Write Performance')),
              h('div', { className: 'stats-row' },
                h('div', { className: 'stat-card' },
                  h('div', { className: 'stat-value' }, formatCount(stats.batch_writes.totalWritesWithoutBatching)),
                  h('div', { className: 'stat-label' }, 'Total Searches')
                ),
                h('div', { className: 'stat-card' },
                  h('div', { className: 'stat-value' }, String(stats.batch_writes.totalBatchesFlushed)),
                  h('div', { className: 'stat-label' }, 'DB Batch Flushes')
                ),
                h('div', { className: 'stat-card' },
                  h('div', { className: 'stat-value' }, stats.batch_writes.writeReductionPercent + '%'),
                  h('div', { className: 'stat-label' }, 'Write Reduction')
                ),
                h('div', { className: 'stat-card' },
                  h('div', { className: 'stat-value' }, String(stats.batch_writes.currentBufferSize)),
                  h('div', { className: 'stat-label' }, 'Pending in Buffer')
                )
              )
            )
          : null,

        h('div', { className: 'debug-panel', key: 'debug' },
          h('details', null,
            h('summary', null, h('span', { style: { display: 'inline-flex', alignItems: 'center', gap: 6 } }, Icon('settings', 16), ' Consistent Hash & Cache Debug')),
            debugInfo
              ? h('div', { className: 'debug-content' }, JSON.stringify(debugInfo, null, 2))
              : h('div', { className: 'debug-content', style: { color: '#64748b' } },
                  'Type a prefix above to see which cache node handles it.'
                )
          )
        ),

        h('div', { className: 'footer' },
          'Search Typeahead \u00B7 HLD101 \u00B7 Built with Node.js \u00B7 PostgreSQL \u00B7 Redis'
        )
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(h(App));
  </script>
</body>
</html>
